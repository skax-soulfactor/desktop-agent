# v* 태그를 푸시하면 3개 OS에서 빌드해 GitHub Release에 산출물과
# 자동 업데이트 메타데이터(latest*.yml)를 업로드한다.
#
#   npm version patch   # package.json 버전 올리고 v0.1.1 태그 생성
#   git push --follow-tags
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # GITHUB_TOKEN으로 Release 생성/업로드

jobs:
  release:
    strategy:
      # 순차 실행이 필수: 세 OS가 동시에 같은 태그의 Release를 만들려 하면
      # 먼저 만든 잡만 성공하고 나머지는 422(already_exists)로 실패한다.
      # 첫 잡이 Release를 만들고 나머지 잡은 같은 태그의 기존 Release에 자산만 올린다.
      max-parallel: 1
      # 한 OS가 실패해도 나머지 OS 산출물은 계속 업로드한다.
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Build and publish
        run: npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
