# v* 태그를 푸시하면 3개 OS에서 빌드해 GitHub Release에 산출물과
# 자동 업데이트 메타데이터(latest*.yml)를 업로드한다.
#
#   npm version patch   # package.json 버전 올리고 v0.1.1 태그 생성
#   git push --follow-tags
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # GITHUB_TOKEN으로 Release 생성/업로드

jobs:
  # 매트릭스 빌드 전에 Release를 한 번만 만들어 둔다.
  # 이렇게 하지 않으면 각 OS 잡뿐 아니라 한 잡 안의 여러 퍼블리셔(mac의 zip·dmg 등)가
  # 동시에 Release를 만들려다 먼저 만든 쪽만 성공하고 나머지는 422(already_exists)로
  # 깨진다(자산 유실). Release가 이미 있으면 모두 자산만 업로드한다.
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create release if missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if ! gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$tag" --repo "$GITHUB_REPOSITORY" \
              --title "$tag" --notes "$tag" --latest
          fi

  release:
    needs: create-release
    strategy:
      # Release가 선생성돼 생성 경쟁이 없으므로 병렬로 빌드해도 안전하다.
      # 각 OS는 서로 다른 이름의 자산·채널 파일(latest-mac/latest/latest-linux.yml)만 올린다.
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Build and publish
        run: npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
